<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The List — Recommend a spot</title>
<meta name="description" content="Recommend a place and dish for The List. Reviewed before it goes on the guide." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #FBF7EE; --card: #FFFDF8; --ink: #1E1B17; --ink-soft: #756B5F;
    --line: #E6DCCB; --line-strong: #D6C9B2; --tomato: #D8412F; --pine: #176B5C;
    --gold: #E8A33D; --shadow: 14px 16px 0 rgba(30, 27, 23, 0.06); --r: 4px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background-color: var(--paper);
    background-image: radial-gradient(rgba(30,27,23,0.035) 1px, transparent 1px);
    background-size: 22px 22px; color: var(--ink);
    font-family: "Newsreader", Georgia, serif; font-size: 17px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  a { color: var(--tomato); text-underline-offset: 3px; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 24px 80px; }

  header.masthead { padding: 40px 0 8px; }
  .kicker {
    font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--tomato); display: flex; align-items: center; gap: 12px;
  }
  .kicker::after { content: ""; flex: 1; height: 1px; background: var(--line-strong); }
  h1.title {
    font-family: "Bricolage Grotesque", sans-serif; font-weight: 800;
    font-size: clamp(2.2rem, 6vw, 3.4rem); line-height: 0.95;
    letter-spacing: -0.02em; margin: 16px 0 0;
  }
  h1.title em { font-style: normal; color: var(--tomato); }
  .thesis { margin: 16px 0 0; color: var(--ink-soft); }
  .thesis a { font-weight: 500; }

  form.panel {
    margin-top: 30px; background: var(--card); border: 1.5px solid var(--line-strong);
    border-radius: var(--r); box-shadow: var(--shadow); padding: 24px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-family: "JetBrains Mono", monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px;
  }
  .field label .req { color: var(--tomato); }
  .field input, .field select, .field textarea {
    width: 100%; font-family: inherit; font-size: 16px; color: var(--ink);
    background: var(--paper); border: 1.5px solid var(--line-strong);
    border-radius: var(--r); padding: 10px 12px;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--tomato); }
  .field input:invalid:not(:placeholder-shown) { border-color: var(--tomato); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 520px) { .row2 { grid-template-columns: 1fr; } }

  .seg { display: inline-flex; border: 1.5px solid var(--line-strong); border-radius: var(--r); overflow: hidden; }
  .seg button {
    appearance: none; cursor: pointer; background: var(--paper); border: 0;
    border-right: 1.5px solid var(--line-strong); font-family: "JetBrains Mono", monospace;
    font-weight: 700; font-size: 15px; padding: 9px 18px; color: var(--ink-soft);
  }
  .seg button:last-child { border-right: 0; }
  .seg button[aria-pressed="true"] { background: var(--ink); color: var(--paper); }

  .btn {
    appearance: none; cursor: pointer; font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700; font-size: 16px; border-radius: var(--r); padding: 12px 22px;
    border: 1.5px solid var(--tomato); background: var(--tomato); color: #fff;
  }
  .btn:hover { filter: brightness(1.05); }
  .btn:disabled { opacity: 0.55; cursor: default; }
  .msg { margin-top: 16px; font-family: "JetBrains Mono", monospace; font-size: 13px; }
  .msg.err { color: var(--tomato); }
  .msg.ok { color: var(--pine); }

  .done {
    margin-top: 30px; background: var(--card); border: 1.5px solid var(--pine);
    border-radius: var(--r); box-shadow: var(--shadow); padding: 28px; text-align: center;
  }
  .done h2 { font-family: "Bricolage Grotesque", sans-serif; margin: 0 0 8px; font-size: 1.6rem; }
  .done p { color: var(--ink-soft); margin: 0 0 18px; }
  .done .btn { background: transparent; color: var(--ink); border-color: var(--ink); }
  :focus-visible { outline: 3px solid var(--tomato); outline-offset: 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <div class="kicker">The List · Recommend a spot</div>
      <h1 class="title">Got a place we <em>have</em> to try?</h1>
      <p class="thesis">Tell us the spot and the exact dish to order. We'll check it out and maybe
        add it to the guide. <a href="../index.html">← Back to the guide</a></p>
    </header>

    <form class="panel" id="form" autocomplete="off">
      <div class="field">
        <label for="city">City <span class="req">*</span></label>
        <select id="city" required>
          <option value="" disabled selected>Choose a city…</option>
          <option value="la">🌴 Los Angeles</option>
          <option value="sf">🌉 San Francisco</option>
          <option value="ny">🗽 New York</option>
          <option value="sea">🌧️ Seattle</option>
        </select>
      </div>

      <div class="field">
        <label for="name">Place name <span class="req">*</span></label>
        <input type="text" id="name" required placeholder="e.g. Sqirl" />
      </div>

      <div class="row2">
        <div class="field">
          <label for="cuisine">Cuisine <span class="req">*</span></label>
          <input type="text" id="cuisine" required placeholder="e.g. Cafe" />
        </div>
        <div class="field">
          <label for="loc">Neighborhood <span class="req">*</span></label>
          <input type="text" id="loc" required placeholder="e.g. Virgil Village" />
        </div>
      </div>

      <div class="field">
        <label for="desc">Dish to order <span class="req">*</span></label>
        <input type="text" id="desc" required placeholder="e.g. Ricotta toast" />
      </div>

      <div class="row2">
        <div class="field">
          <label>Price <span class="req">*</span></label>
          <div class="seg" id="price" role="group" aria-label="Price">
            <button type="button" data-price="$" aria-pressed="false">$</button>
            <button type="button" data-price="$$" aria-pressed="false">$$</button>
            <button type="button" data-price="$$$" aria-pressed="false">$$$</button>
          </div>
        </div>
        <div class="field">
          <label for="yelp">Yelp URL <span class="req">*</span></label>
          <input type="url" id="yelp" required placeholder="https://www.yelp.com/biz/…" />
        </div>
      </div>

      <div class="field">
        <label for="by">Your name <span class="req">*</span></label>
        <input type="text" id="by" required placeholder="So we can credit / blame you" />
      </div>

      <div class="field">
        <label for="note">Why we should go <span class="req">*</span></label>
        <textarea id="note" required placeholder="What makes it worth the trip?"></textarea>
      </div>

      <button type="submit" class="btn" id="submit">Send recommendation →</button>
      <div class="msg" id="msg" role="status"></div>
    </form>

    <div class="done" id="done" hidden>
      <h2>Thanks! 🎉</h2>
      <p>Your recommendation is in the queue. We'll review it and maybe add it to the list.</p>
      <button type="button" class="btn" id="again">Recommend another</button>
    </div>
  </div>

  <script src="../config.js"></script>
  <script>
  (function () {
    const API_BASE = window.API_BASE || "";
    const $ = (s) => document.querySelector(s);
    const form = $("#form"), msg = $("#msg"), submit = $("#submit");
    let price = "";

    $("#price").querySelectorAll("[data-price]").forEach((b) =>
      b.addEventListener("click", () => {
        price = (price === b.dataset.price) ? "" : b.dataset.price;
        $("#price").querySelectorAll("[data-price]").forEach((x) =>
          x.setAttribute("aria-pressed", x.dataset.price === price));
      }));

    function val(id) { return $("#" + id).value.trim(); }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.className = "msg";
      if (!price) { msg.className = "msg err"; msg.textContent = "Pick a price."; return; }

      const payload = {
        city: $("#city").value, name: val("name"), cuisine: val("cuisine"),
        description: val("desc"), location: val("loc"), price,
        yelp: val("yelp"), submitted_by: val("by"), note: val("note"),
      };

      submit.disabled = true; msg.textContent = "Sending…";
      try {
        const r = await fetch(API_BASE + "/api/entries", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || "Something went wrong.");
        form.hidden = true;
        $("#done").hidden = false;
      } catch (err) {
        msg.className = "msg err"; msg.textContent = err.message;
      } finally {
        submit.disabled = false;
      }
    });

    $("#again").addEventListener("click", () => {
      form.reset(); price = "";
      $("#price").querySelectorAll("[data-price]").forEach((x) => x.setAttribute("aria-pressed", "false"));
      msg.textContent = ""; form.hidden = false; $("#done").hidden = true;
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  })();
  </script>
</body>
</html>
